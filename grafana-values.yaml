global: # 1
  imageRegistry: docker.io

deploymentStrategy: # 77
  rollingUpdate:
    maxSurge: 0
    maxUnavailable: 1

service: # 233
  type: LoadBalancer
  loadBalancerIP: 192.168.64.90

ingress: # 285
  enabled: false

resources: # 362
  limits: null
  requests:
    cpu: 10m
    memory: 10Mi

envValueFrom: # 556
  MARIADB_PASSWORD:
    secretKeyRef:
      name: mariadb-credentials
      key: mariadb-grafana-password

datasources: # 672
  datasources.yaml:
    apiVersion: 1
    datasources:
    - name: prometheus
      type: prometheus
      access: proxy
      url: http://prometheus
    - name: loki
      type: loki
      access: proxy
      url: http://loki:3100

grafana.ini: # 887
  database:
    type: mysql
    host: mariadb.mariadb:3306
    name: grafana
    user: grafana
    password: $__env{MARIADB_PASSWORD}
